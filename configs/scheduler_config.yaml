apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduler-config
  namespace: default
data:
  scheduler.yaml: |
    profile_handler:
      type: single_profile
    profiles:
      epp_backpressure:
        scorers:
          - type: waiting_queue
            weight: 1.0
          - type: running_queue
            weight: 1.0
          - type: kv_cache
            weight: 2.0
        picker:
          type: max_score
